services:
  db:
    build: .
    container_name: comp_track_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_comp_track:/var/lib/postgresql

volumes:
  postgres_data_comp_track: